id: analysis_sliced_wasserstein_drift_v1
name: "analysis_sliced_wasserstein_drift_v1"
version: "0.1.0"
type: analysis
entrypoint: "plugin.py:Plugin"
depends_on: []
capabilities: [needs_eventlog, needs_numeric]
settings:
  description: "Distribution drift detection using sliced Wasserstein distance (POT)"
  defaults:
    seed: 1337
    target_column: null
    n_projections: 50
config_schema: config.schema.json
output_schema: output.schema.json
sandbox:

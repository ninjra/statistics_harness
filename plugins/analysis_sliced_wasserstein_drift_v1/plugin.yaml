  fs_allowlist:
    - run_dir

citation:
  method: "Sliced Wasserstein Distance"
  reference_key: "sliced_wasserstein"
  paper: "Bonneel et al. 2015 - Sliced and Radon Wasserstein Barycenters"
  finding_kind: "distribution"

id: analysis_kona_3d_landscape_v1
name: Kona 3D Energy Landscape (v1)
version: 1.0.0
type: analysis
entrypoint: plugin.py:Plugin
depends_on:
  - analysis_ideaspace_energy_ebm_v1
settings:
  description: 3D energy landscape visualization via PCA projection and griddata interpolation.
  defaults:
    enabled: false
    grid_resolution: 50
    grid_margin_pct: 0.15
    include_route_overlay: true
    min_entities_for_surface: 4
capabilities: []
config_schema: config.schema.json
output_schema: output.schema.json
sandbox:
  no_network: true
  fs_allowlist:
    - appdata
    - plugins
    - run_dir
citation:
  method: "Kona 3D Energy Landscape"
  reference_key: "kona_3d_landscape"
  paper: ""
  finding_kind: "kona_3d_landscape"
